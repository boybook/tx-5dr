<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="quick-controls.css">
</head>
<body>
  <div class="container">
    <div class="control-row">
      <input type="text" id="labelInput" placeholder="Label">
      <button class="btn btn-sm" id="setLabelBtn">Set</button>
    </div>
    <div class="control-row">
      <button class="btn btn-primary" id="incrementBtn">+1</button>
      <span class="value" id="counterValue">0</span>
      <button class="btn btn-danger btn-sm" id="resetBtn">Reset</button>
    </div>
  </div>
  <script src="quick-controls.js"></script>
</body>
</html>
