<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <div class="section-title" id="connectionTitle">QRZ.com Connection</div>
    <div class="form-group">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Enter QRZ.com API key">
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="testBtn">
        <span class="spinner hidden"></span>
        <span class="btn-text">Test Connection</span>
      </button>
      <span class="chip hidden" id="testResult"></span>
    </div>

    <hr class="section-divider">

    <div class="section-title" id="syncTitle">Sync Options</div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label" id="autoUploadLabel">Auto-upload after QSO</div>
        <div class="toggle-desc" id="autoUploadDesc">Automatically upload QSO records to QRZ.com when a contact is completed</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="autoUpload" checked>
        <span class="slider"></span>
      </label>
    </div>

    <hr class="section-divider">

    <div class="btn-row">
      <button class="btn btn-primary" id="saveBtn">
        <span class="btn-text">Save</span>
      </button>
      <span class="chip hidden" id="saveResult"></span>
    </div>

    <div class="status-row hidden" id="lastSync"></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
